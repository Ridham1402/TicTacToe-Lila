# render.yaml — Render.com infrastructure as code.
# Defines one Docker web service (Nakama) and one free managed PostgreSQL database.
#
# Deploy:
#   1. Push repo to GitHub
#   2. Connect to Render.com → "New Blueprint" → point to this repo
#   3. Render provisions nakama-db, injects DATABASE_URL into the service

services:
  - type: web
    name: nakama-tictactoe
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    # Health check Render uses to detect a running instance
    healthCheckPath: /healthcheck
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nakama-db
          property: connectionString
      # Override console credentials for production
      - key: NAKAMA_CONSOLE_PASSWORD
        generateValue: true

databases:
  - name: nakama-db
    plan: free
    region: oregon
    databaseName: nakama
    user: nakama
    # NOTE: Render free-tier PostgreSQL databases expire after 90 days.
    # You will receive an email warning beforehand.
    # To renew: go to Render dashboard → database → "Extend" (or recreate it).
    # After recreation, re-link the DATABASE_URL env var in the service settings.
