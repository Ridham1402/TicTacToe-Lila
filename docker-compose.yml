version: "3.8"

# Local development stack: PostgreSQL + Nakama
# Run: docker-compose up -d
# Nakama console: http://localhost:7351  (admin / password)
# Nakama socket:  ws://localhost:7350

services:
  postgres:
    image: postgres:14-alpine
    container_name: tictactoe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    image: heroiclabs/nakama:3.21.1
    container_name: tictactoe-nakama
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        /nakama/nakama migrate up \
          --database.address postgres://nakama:localpassword@postgres:5432/nakama && \
        exec /nakama/nakama \
          --config /nakama/data/config/local.yml \
          --database.address postgres://nakama:localpassword@postgres:5432/nakama
    ports:
      - "7349:7349"   # gRPC API
      - "7350:7350"   # HTTP & WebSocket API
      - "7351:7351"   # Console
    volumes:
      # Mount the built JS module
      - ./nakama/dist/main.js:/nakama/data/modules/main.js:ro
      # Mount the config
      - ./nakama/local.yml:/nakama/data/config/local.yml:ro
    environment:
      # DATABASE_URL is overridden by --database.address flag above
      - LOG_LEVEL=INFO
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:7350/healthcheck",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
